name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  windows:
    name: Windows checks
    runs-on: windows-latest

    env:
      CARGO_TERM_COLOR: always
      PYTHONUTF8: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            platform/tauri/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Python dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,desktop,packaging]"

      - name: Install web dependencies
        shell: pwsh
        working-directory: web
        run: npm ci

      - name: Install Tauri dependencies
        shell: pwsh
        working-directory: platform/tauri
        run: npm ci

      - name: Python checks
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          python -m compileall -q src tests
          python -m pytest -q

      - name: Web checks
        shell: pwsh
        working-directory: web
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          npm run test -- --run
          npm exec -- tsc --noEmit
          npm run build

      - name: Rust checks
        shell: pwsh
        working-directory: platform/tauri/src-tauri
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          cargo fmt --check
          cargo check --locked
          cargo test --locked
